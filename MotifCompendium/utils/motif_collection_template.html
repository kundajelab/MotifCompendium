<!DOCTYPE html>
<html>
<head>
    <title>Report</title>
    <style>
        .container {
            column-count: 2;
            column-gap: 20px;
        }
        .section-box {
            border: 1px solid black;
            padding: 10px;
            margin-bottom: 20px;
            background-color: #f0f0f0;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .section-title {
            font-family: Arial, sans-serif;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        .plot-name {
            font-family: Arial, sans-serif;
            font-size: 10px;
            font-weight: bold;
        }
        .plot-image {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        {% for group_name in sorted(data.keys()) %}
        <div class="section-box">
            <div class="section-title"> Cluster {{ group_name }} </div>
            {% for motif_dict in data[group_name] %}
                <div class="plot-name">{{ loop.index }}) {{ motif_dict['name'] }} </div>
                <img src="data:image/png;base64,{{ motif_dict['utf8_plot'] }}" class="plot-image">
            {% endfor %}
        </div>
        {% endfor %}
    </div>
</body>
</html>
